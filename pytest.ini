[pytest]
# Pytest configuration for notebook testing

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers (for categorizing tests)
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    module1: tests for Module 1 notebooks
    module2: tests for Module 2 notebooks
    module3: tests for Module 3 notebooks
    setup: tests for Setup notebooks
    examples: tests for example notebooks

# Timeout (requires pytest-timeout)
# timeout = 3600

# Test output
console_output_style = progress

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
