name: Test Notebooks

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'notebooks/**/*.ipynb'
      - 'test_notebooks.py'
      - 'requirements-test.txt'
      - 'docker-compose.yml'
      - '.github/workflows/test-notebooks.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      notebooks: ${{ steps.filter.outputs.notebooks }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            notebooks:
              - 'notebooks/**/*.ipynb'
              - 'test_notebooks.py'
              - 'requirements-test.txt'
              - 'docker-compose.yml'
              - '.github/workflows/test-notebooks.yml'

  test-notebooks:
    needs: changes
    if: needs.changes.outputs.notebooks == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        notebook:
          - "Module1_Apache_Iceberg_Fundamentals"
          - "Module2_Taking_Advantage_of_Iceberg_Tables"
          - "Module3_Operating_and_Optimizing_Apache_Iceberg"
          # E1.1 skipped — requires Trino which needs more RAM than ubuntu-latest provides
          # - "E1_1_OpenLakehouse"
          - "E1_2_DataModeling"
          - "E2_1_MovingExistingTables"
          - "E2_2_BranchingAndTagging"
          - "E2_3_SchemaAndPartitionEvolution"
          - "E3_1_Ingestion"
          - "E3_2_MaintenanceProcedures"
          - "E3_3_TableModelingAndIngestion"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'requirements-test.txt'
    
    - name: Install test dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements-test.txt
    
    - name: Create .env file
      run: |
        if [ ! -f .env ]; then
        cat > .env << 'EOF'
        SPARK_VERSION=4.0.1
        ICEBERG_VERSION=1.10.0
        ICEBERG_SPARK_RUNTIME_VERSION=1.10.0
        SCALA_VERSION=2.13
        AWS_SDK_VERSION=2.21.0
        TRINO_VERSION=465
        POLARIS_CLIENT_ID=root
        POLARIS_CLIENT_SECRET=s3cr3t
        EOF
        fi
    
    - name: Fix notebook directory permissions for container
      run: |
        chmod -R a+w notebooks/
    
    - name: Start Docker services
      run: |
        docker compose up -d
        timeout 300 bash -c 'until docker exec jupyter-spark curl -f http://localhost:8888/api 2>/dev/null; do sleep 5; done'
    
    - name: Run test for ${{ matrix.notebook }}
      run: |
        if [[ "${{ matrix.notebook }}" == Module* ]]; then
          pytest test_notebooks.py -v -k "test_01_setup or ${{ matrix.notebook }}" --tb=short
        else
          pytest test_notebooks.py -v -k "${{ matrix.notebook }}" --tb=short
        fi
      timeout-minutes: 45
    
    - name: Publish test summary
      if: always()
      run: |
        if [ -f test-summary.md ]; then
          echo "## ${{ matrix.notebook }}" >> $GITHUB_STEP_SUMMARY
          cat test-summary.md >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Upload test results for ${{ matrix.notebook }}
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.notebook }}
        path: |
          notebooks/**/*_executed.ipynb
        retention-days: 7
    
    - name: Stop Docker services
      if: always()
      run: |
        docker compose down -v

  test-gate:
    needs: [changes, test-notebooks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.test-notebooks.result }}" == "failure" || "${{ needs.test-notebooks.result }}" == "cancelled" ]]; then
            echo "Test notebooks failed or were cancelled"
            exit 1
          fi
          echo "Gate passed (test result: ${{ needs.test-notebooks.result }})"
