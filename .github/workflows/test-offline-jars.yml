name: Test Offline JARs

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'manual-download-dependencies.sh'
      - 'generate-spark-config.py'
      - 'spark-defaults.conf.template'
      - 'docker-compose.yml'
      - '.env'
      - '.github/workflows/test-offline-jars.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      offline: ${{ steps.filter.outputs.offline }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            offline:
              - 'manual-download-dependencies.sh'
              - 'generate-spark-config.py'
              - 'spark-defaults.conf.template'
              - 'docker-compose.yml'
              - '.env'
              - '.github/workflows/test-offline-jars.yml'

  test-offline-jars:
    needs: changes
    if: needs.changes.outputs.offline == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false

    - name: Download JARs using offline script
      run: |
        chmod +x manual-download-dependencies.sh
        ./manual-download-dependencies.sh

    - name: Verify JARs were downloaded
      run: |
        echo "=== Downloaded JARs ==="
        ls -lh jars/*.jar
        jar_count=$(ls jars/*.jar | wc -l)
        echo "JAR count: ${jar_count}"
        if [ "$jar_count" -lt 4 ]; then
          echo "FAIL: Expected at least 4 JARs, found ${jar_count}"
          exit 1
        fi

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'requirements-test.txt'

    - name: Install test dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements-test.txt

    - name: Fix notebook directory permissions for container
      run: |
        chmod -R a+w notebooks/

    - name: Start Docker services
      run: |
        docker compose up -d
        timeout 300 bash -c 'until docker exec jupyter-spark curl -f http://localhost:8888/api 2>/dev/null; do sleep 5; done'

    - name: Verify Spark config uses local JARs
      run: |
        echo "=== Generated spark-defaults.conf ==="
        docker exec jupyter-spark cat /home/jovyan/.sparkconf/spark-defaults.conf
        echo ""
        echo "=== Checking for spark.jars (local path mode) ==="
        docker exec jupyter-spark grep "^spark\.jars=" /home/jovyan/.sparkconf/spark-defaults.conf
        echo ""
        echo "=== Verifying spark.jars.packages is NOT present ==="
        if docker exec jupyter-spark grep "^spark\.jars\.packages=" /home/jovyan/.sparkconf/spark-defaults.conf; then
          echo "FAIL: spark.jars.packages should not be present when using local JARs"
          exit 1
        fi
        echo "PASS: Config correctly uses spark.jars with local paths"

    - name: Run notebook to verify Spark works with local JARs
      run: |
        pytest test_notebooks.py -v -k "test_01_setup or E1_2_DataModeling" --tb=short
      timeout-minutes: 30

    - name: Publish test summary
      if: always()
      run: |
        if [ -f test-summary.md ]; then
          echo "## Offline JARs Test" >> $GITHUB_STEP_SUMMARY
          cat test-summary.md >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: test-results-offline-jars
        path: |
          notebooks/**/*_executed.ipynb
        retention-days: 7

    - name: Stop Docker services
      if: always()
      run: |
        docker compose down -v

  test-gate:
    needs: [changes, test-offline-jars]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.test-offline-jars.result }}" == "failure" || "${{ needs.test-offline-jars.result }}" == "cancelled" ]]; then
            echo "Offline JARs test failed or was cancelled"
            exit 1
          fi
          echo "Gate passed (test result: ${{ needs.test-offline-jars.result }})"
