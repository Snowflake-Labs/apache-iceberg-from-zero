name: Check Notebooks Stripped

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - main
    paths:
      - '**.ipynb'
      - '.github/workflows/check-notebooks.yml'
  workflow_dispatch:

concurrency:
  group: check-notebooks-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      notebooks: ${{ steps.filter.outputs.notebooks }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            notebooks:
              - '**.ipynb'

  check-notebooks:
    needs: changes
    if: needs.changes.outputs.notebooks == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Install nbstripout
        run: pip install nbstripout

      - name: Check notebooks are stripped
        run: |
          failed=0
          while IFS= read -r -d '' notebook; do
            echo "Checking $notebook..."
            if ! nbstripout --verify "$notebook"; then
              echo "❌ $notebook has unstripped output"
              failed=1
            else
              echo "✅ $notebook is clean"
            fi
          done < <(find . -name '*.ipynb' -not -path './.git/*' -not -path './node_modules/*' -print0)

          if [ $failed -eq 1 ]; then
            echo ""
            echo "================================================"
            echo "Some notebooks have output that should be stripped."
            echo "Run: nbstripout <notebook-file>"
            echo "================================================"
            exit 1
          fi

          echo "All notebooks are properly stripped! ✅"

  check-gate:
    needs: [changes, check-notebooks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.check-notebooks.result }}" == "failure" || "${{ needs.check-notebooks.result }}" == "cancelled" ]]; then
            echo "Check notebooks failed or was cancelled"
            exit 1
          fi
          echo "Gate passed (check result: ${{ needs.check-notebooks.result }})"
