services:
  # MinIO - S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    networks:
      - iceberg-net
    healthcheck:
      test: ["CMD", "curl", "http://127.0.0.1:9000/minio/health/live"]
      interval: 1s
      timeout: 10s

  # Polaris Iceberg REST Catalog (following official Apache guide)
  polaris:
    image: apache/polaris:latest
    container_name: polaris-catalog
    ports:
      - "8181:8181"
      - "5005:5005"
    environment:
      JAVA_DEBUG: "true"
      JAVA_DEBUG_PORT: "*:5005"
      AWS_REGION: us-west-2
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      # Bootstrap credentials: REALM,CLIENT_ID,CLIENT_SECRET
      POLARIS_BOOTSTRAP_CREDENTIALS: "POLARIS,root,s3cr3t"
      polaris.realm-context.realms: "POLARIS"
      quarkus.otel.sdk.disabled: "true"
    volumes:
      - ./data/polaris:/var/polaris
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - iceberg-net
    healthcheck:
      test: ["CMD", "curl", "http://localhost:8182/q/health"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 10s

  # Setup MinIO bucket
  setup_bucket:
    image: minio/mc:latest
    container_name: setup-minio
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: "/bin/sh"
    command:
      - "-c"
      - >-
        echo Creating MinIO bucket...;
        mc alias set pol http://minio:9000 admin password;
        mc mb pol/warehouse || true;
        mc ls pol;
        echo Bucket setup complete.
    networks:
      - iceberg-net

  # Setup Polaris catalog
  polaris-setup:
    image: alpine/curl:8.11.1
    container_name: setup-polaris
    depends_on:
      polaris:
        condition: service_healthy
    environment:
      - CLIENT_ID=root
      - CLIENT_SECRET=s3cr3t
    volumes:
      - ./polaris:/setup
    entrypoint: "/bin/sh"
    command:
      - "-c"
      - >-
        apk add --no-cache jq;
        chmod +x /setup/*.sh;
        /setup/bootstrap-catalog.sh;
    networks:
      - iceberg-net

  # Spark
  spark:
    image: apache/spark:${SPARK_VERSION}-scala${SCALA_VERSION}-java17-python3-ubuntu
    container_name: spark-master
    ports:
      - "8081:8081"
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark
      - SPARK_MASTER_PORT=7077
    volumes:
      - ./spark/conf:/opt/spark/conf
      - ./data/spark:/data/spark
      - ./notebooks:/notebooks
    command: >
      bash -c "
      /opt/spark/sbin/start-master.sh &&
      tail -f /opt/spark/logs/*
      "
    networks:
      - iceberg-net

  # Jupyter Notebook with PySpark and Iceberg
  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-${SPARK_VERSION}
    container_name: jupyter-spark
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_MASTER=spark://spark:7077
      - POLARIS_URI=http://polaris:8181
      - ICEBERG_VERSION=${ICEBERG_VERSION}
      - ICEBERG_SPARK_RUNTIME_VERSION=${ICEBERG_SPARK_RUNTIME_VERSION}
      - SCALA_VERSION=${SCALA_VERSION}
      - AWS_SDK_VERSION=${AWS_SDK_VERSION}
      - POLARIS_CLIENT_ID=${POLARIS_CLIENT_ID}
      - POLARIS_CLIENT_SECRET=${POLARIS_CLIENT_SECRET}
      - AWS_REGION=irrelevant
      - SPARK_CONF_DIR=/home/jovyan/.sparkconf
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data/jupyter:/data/jupyter
      - ./jupyter/jupyter-spark-defaults.conf.template:/tmp/spark-defaults.conf.template:ro
      - ./jupyter/generate-spark-config.py:/tmp/generate-spark-config.py:ro
    command: >
      bash -c "
      set -e &&
      mkdir -p /home/jovyan/.sparkconf &&
      python3 /tmp/generate-spark-config.py &&
      pip install --quiet pyiceberg[pyarrow,pandas] trino sqlalchemy matplotlib seaborn requests &&
      start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
      "
    depends_on:
      - spark
      - polaris
      - polaris-setup
    networks:
      - iceberg-net

  # Trino
  trino:
    image: trinodb/trino:${TRINO_VERSION}
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/config:/etc/trino
      - ./data/trino:/data/trino
    depends_on:
      - polaris
      - polaris-setup
    networks:
      - iceberg-net

networks:
  iceberg-net:
    driver: bridge
